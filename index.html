<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#AEC6CF" />
    <link rel="icon" type="image/png" href="/src/assets/images/boyita_app_logo_1780186577604.png" />
    <link rel="apple-touch-icon" href="/src/assets/images/boyita_app_logo_1780186577604.png" />
    <title>Boyita App</title>
    <script>
      function clearAllAndReload() {
        if(confirm('¿Seguro que quieres borrar todos los datos locales y reiniciar?')) {
          localStorage.clear();
          sessionStorage.clear();
          window.location.reload();
        }
      }
      window.addEventListener('error', function(event) {
        console.error("Window Error:", event);
        var root = document.getElementById('root');
        if(root && !root.innerHTML.includes('Crashed')) {
          root.innerHTML = '<div style="padding: 20px; color: red; font-family: sans-serif;">' +
            '<h2>¡La aplicación se detuvo!</h2>' +
            '<p>Error: ' + event.message + '</p>' +
            '<button onclick="clearAllAndReload()" style="margin-top:10px; padding:10px; background:white; color:red; border:1px solid red; border-radius:8px; cursor:pointer;">Limpiar Caché y Reintentar</button>' +
            '</div>';
        }
      });
    </script>
  </head>
  <body style="margin: 0; background-color: #f9fafb;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
